app = "waba-bot-frontend"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_BACKEND_URL = "https://waba-bot-backend.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
