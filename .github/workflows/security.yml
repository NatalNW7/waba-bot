name: Security Gates

on:
  workflow_call:

permissions:
  contents: read

jobs:
  sast:
    runs-on: ubuntu-latest
    name: Semgrep Scan
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Semgrep SAST
        run: semgrep scan --config auto --error

  secrets-scan:
    runs-on: ubuntu-latest
    name: GitLeaks Scan
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca:
    runs-on: ubuntu-latest
    name: Trivy SCA Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Trivy SCA Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: '1'
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  image-scan:
    runs-on: ubuntu-latest
    name: Trivy Image Scan (${{ matrix.app }})
    strategy:
      fail-fast: false
      matrix:
        app: [frontend, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node dependencies
        uses: ./.github/actions/setup-node  

      - name: Build Docker image via Turbo
        run: pnpm turbo run build:docker --filter=@waba-bot/${{ matrix.app }}

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "waba-bot-${{ matrix.app }}:latest"
          format: "table"
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"