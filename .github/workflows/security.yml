name: Security Gates

on:
  workflow_call:

permissions:
  contents: read

jobs:
  sast:
    runs-on: ubuntu-latest
    name: Semgrep Scan

  secrets-scan:
    runs-on: ubuntu-latest
    name: GitLeaks Scan
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca:
    runs-on: ubuntu-latest
    name: Trivy SCA Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Trivy SCA Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: '1'
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  image-scan:
    runs-on: ubuntu-latest
    name: Trivy Image Scan
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image
        run: docker build -t waba-bot:ci-scan .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "waba-bot:ci-scan"
          format: "table"
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"