name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - backend
          - frontend
        default: 'all'

permissions:
  contents: write

jobs:

  security-gates:
    name: Security Gates
    if: ${{ vars.SKIP_SECURITY_GATES != 'true' && vars.SKIP_SECURITY_GATES != true }}
    uses: ./.github/workflows/security.yml

  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    needs: security-gates
    if: ${{ always() && (needs.security-gates.result == 'success' || needs.security-gates.result == 'skipped') }}
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
            frontend:
              - 'apps/frontend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'

  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >
      needs.detect-changes.outputs.backend == 'true' ||
      inputs.service == 'backend' ||
      inputs.service == 'all'
    concurrency: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --filter @waba-bot/backend...

      - name: Run Prisma migrations
        run: pnpm --filter @waba-bot/backend exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        run: flyctl deploy --remote-only --config apps/backend/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend to Fly.io
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >
      needs.detect-changes.outputs.frontend == 'true' ||
      inputs.service == 'frontend' ||
      inputs.service == 'all'
    concurrency: deploy-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy frontend
        run: flyctl deploy --remote-only --config apps/frontend/fly.toml --build-arg NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}